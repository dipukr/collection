<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Best Approximation UI</title>
  <style>
    body {
      background-color: #f5f5f7;
      font-family: 'Inter', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: white;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      border-radius: 10px;
      width: 1400px;
      height: 600px;
      padding: 30px 40px;
    }

    .title {
      font-size: 1.4em;
      font-weight: 600;
      color: #222;
    }

    .subtitle {
      margin-top: 5px;
      color: #555;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-top: 25px;
    }

    .field {
      display: flex;
      flex-direction: column;
    }

    .field label {
      font-size: 0.9em;
      color: #666;
      margin-bottom: 5px;
    }

    .field input {
      padding: 20px 15px;
      border: 2px solid #555555;
      border-radius: 4px;
      font-size: 1em;
      outline: none;
      transition: border-color 0.2s;
    }

    .field input:focus {
      border-color: #6c63ff;
      box-shadow: 0 0 0 2px rgba(108,99,255,0.2);
    }

    .bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 30px;
    }

    .btn {
      background: none;
      border: none;
      font-weight: 600;
      font-size: 1em;
      color: #6c63ff;
      cursor: pointer;
      transition: color 0.2s;
    }

    .btn:hover {
      color: #554ce8;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">Best approximation:</div>
    <div class="subtitle">Gen: 1</div>

    <div class="grid" style="grid-template-columns: 1fr 1fr;">
      <div class="field">
        <label>Inputs</label>
        <input type="text" value="0,1,3,5" />
      </div>
      <div class="field">
        <label>Outputs</label>
        <input type="text" value="1,2,10,26" />
      </div>
    </div>

    <div class="grid" style="margin-top: 25px;">
      <div class="field">
        <label>PopulationSize</label>
        <input type="text" value="600" />
      </div>
      <div class="field">
        <label>Gens</label>
        <input type="text" value="100" />
      </div>
      <div class="field">
        <label>Complexity</label>
        <input type="text" value="2" />
      </div>
      <div class="field">
        <label>Diversity</label>
        <input type="text" value="10" />
      </div>
      <div class="field">
        <label>DeathProb</label>
        <input type="text" value="0.5" />
      </div>
    </div>

    <div class="bottom">
      <button class="btn">RESET</button>
      <button class="btn">RUN 100 GENS</button>
    </div>
  </div>
</body>
</html>
