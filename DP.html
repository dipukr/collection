<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta http-equiv="X-UA-Compatible" content="IE=edge" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>DP</title>
	<style type="text/css">
		* {
			margin: 0;
			padding: 0;
		}
		body {
			background: whitesmoke;
			margin-top: 20px;
			width: 60%;
			padding-left: 3%;
			padding-right: 3%;
			min-height: 1000px;
			margin-left: auto;
			margin-right: auto;
			margin-bottom: 20px;
			padding-top: 40px;
			background-color: white;
			box-shadow: 0 0 3px 3px rgba(0, 0, 0, 0.1);
			border-radius: 5px;
			padding-bottom: 100px;
		}
		table {
			border-collapse: collapse;
			margin-bottom: 25px;
			width: 100%;
			word-spacing: -1px;
			font-family: "CMU Serif";
			text-align: justify;
			text-justify: inter-word;
			cursor: pointer;
			overflow: hidden;
			border-radius: 4px;
			color: #551111;
			border-bottom-left-radius: 2px;
			border-bottom-right-radius: 2px;
		}
		table thead tr {
			border-bottom: 4px solid #009879;
			border-left: 4px solid #009879;
			border-right: 4px solid #009879;
		}
		table thead tr th {
			background-color: #009879;
			padding: 4px 20px;
			color: #ffffff;
			text-align: center;
			font-weight: 600;
			font-style: italic;
			font-size: 22px;
		}
		table tbody tr {
			border-bottom: 4px solid #009879;
			border-left: 4px solid #009879;
			border-right: 4px solid #009879;
		}
		table tbody tr td {
			padding: 15px 25px;
			font-weight: 600;
			font-style: italic;
			font-size: 22px;
			background-color: #f8f8f8;
		}
	</style>
</head>
<body>
	<table>
		<thead>
			<tr>
				<th>Visitor</th>
			</tr>
		</thead>
		<tbody>
			<tr>
				<td>
					Visitor pattern allows to add operations to an existing object without altering existing object.
					Visitor pattern follows open-closed principles.
				</td>
			</tr>
		</tbody>
	</table>
	<table>
		<thead>
			<tr>
				<th>Proxy</th>
			</tr>
		</thead>
		<tbody>
			<tr>
				<td>
					Proxy pattern allows us to create proxy or agent of an real object.
				</td>
			</tr>
		</tbody>
	</table>
</body>
</html>
