<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta http-equiv="X-UA-Compatible" content="IE=edge" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Design Patterns</title>
	<style type="text/css">
		* {
			margin: 0;
			padding: 0;
		}
		body {
			background: whitesmoke;
			margin-top: 20px;
			width: 60%;
			padding-left: 3%;
			padding-right: 3%;
			min-height: 1000px;
			margin-left: auto;
			margin-right: auto;
			margin-bottom: 20px;
			padding-top: 40px;
			background-color: white;
			box-shadow: 0 0 3px 3px rgba(0, 0, 0, 0.1);
			border-radius: 5px;
			padding-bottom: 100px;
		}
		table {
			border-collapse: collapse;
			margin-bottom: 30px;
			width: 100%;
			word-spacing: -1px;
			font-family: "DejaVu Serif";
			text-align: justify;
			text-justify: inter-word;
			cursor: pointer;
			overflow: hidden;
			border-radius: 4px;
			color: #551111;
			border-bottom-left-radius: 2px;
			border-bottom-right-radius: 2px;
		}
		table thead tr {
			border-bottom: 4px solid #009879;
			border-left: 4px solid #009879;
			border-right: 4px solid #009879;
		}
		table thead tr th {
			background-color: #009879;
			padding: 8px 20px;
			color: #ffffff;
			text-align: center;
			font-weight: 600;
			font-style: normal;
			font-size: 22px;
		}
		table tbody tr {
			border-bottom: 4px solid #009879;
			border-left: 4px solid #009879;
			border-right: 4px solid #009879;
		}
		table tbody tr td {
			padding: 15px 25px;
			font-weight: 500;
			font-style: normal;
			font-size: 22px;
			background-color: #f8f8f8;
		}
		table tbody tr td ul {
			padding-left: 40px;
			padding-top: 2px;
			padding-bottom: 5px;
			list-style: square;
			font-size: 22px;
		}
		table tbody tr td ul code {
			font-size: 22px;
			font-family: "Source Code Pro";
			font-weight: 700;
			font-style: normal;
		}
		em {
			color: brown;
		}
		pre {
			background: #f8f8f8;
			border: 3px solid #eeeeee;
			font-size: 15px;
			font-weight: 500;
			line-height: normal;
			padding-top: 0px;
			overflow: auto;
			max-width: 99.2%;
			font-family: "Consolas";
			width: 100%;
			word-spacing: -2px;
		}
	</style>
</head>

<body>
	<table>
		<thead>
			<tr>
				<th></th>
			</tr>
		</thead>
		<tbody>
			<tr>
				<td>
					
				</td>
			</tr>
		</tbody>
	</table>
</body>
</html>
